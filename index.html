<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Restration form</title>
</head>
<body>
    <div class="heading">
    <h1>Student Registration Form</h1>
    </div>
    <div class="form">
    <form action="/action_page.php">
        <label for="username">Enter your name:</label>
        <input type="text" id="username" name="username"><br><br>
        <label for="email">Enter your email:</label>
        <input type="text" id="email" name="email" validate><br><br>
        <label for="phone">Enter your Mobile number:</label>
        <input type="tel" id="phone" name="phone"  pattern="[0-9]{3}-[0-9]{4}-[0-9]{3}" placeholder="123-4567-890"><br><br>
        <p>Select your gender:</p><br>
        <input type="radio" id="gender_m" name="gender" value="Male">
        <label for="gender_m">Male</label>
        <input type="radio" id="gender_f" name="gender" value="Female">
        <label for="gender_f">Female</label><br><br>
        <p>choose your favourite course:</p><br>
        <input type="radio" id="html" name="fav_language" value="html">
        <label for="html">HTML</label>
        <input type="radio" id="css" name="fav_language" value="css">
        <label for="css">CSS</label>
        <input type="radio" id="javascript" name="fav_language" value="javascript">
        <label for="javascript">Java Script</label>
        <input type="radio" id="react" name="fav_language" value="react">
        <label for="react">React</label><br><br>
        <label for="birthday">Date of Birth:</label>
        <input type="date" id="birthday" name="birthday"><br><br>
        <div class="submition">
        <input type="submit" value="submit">
        <input type="reset" value="Reset">
        </div>
    </form>
    </div>
</body>
</html>
